name: Full System Audit

on:
  workflow_dispatch:
  schedule:
    # Runs after the daily update and master-audit windows.
    - cron: '47 10 * * *'
  push:
    branches:
      - main
    paths:
      - 'scripts/**'
      - 'src/**'
      - 'data/**'
      - '.github/workflows/**'
      - 'package.json'
      - 'wrangler.toml'
      - 'netlify.toml'
      - '**.html'
      - '**.css'
      - '**.js'

permissions:
  contents: read
  issues: write
  actions: read

concurrency:
  group: full-system-audit-${{ github.ref }}
  cancel-in-progress: true

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: 'true'

jobs:
  full-system-audit:
    name: Full build, double audit, subsystem pressure tests
    runs-on: ubuntu-latest
    timeout-minutes: 60

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '24'

      - name: Install dependencies
        run: npm install

      - name: Run full system audit
        run: node scripts/full-system-audit.js

      - name: Upload full system audit reports
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: full-system-audit-reports
          path: |
            downloads/full-system-audit.json
            downloads/full-system-audit.md
            downloads/site-wide-function-audit.json
            downloads/site-wide-function-audit.md
            site-quality-report.html
            site-freshness-report.html
            data/site-quality-report.json
            data/site-freshness-report.json
            deploy-status.json
            downloads/deploy-status.json
          if-no-files-found: ignore
          retention-days: 21

      - name: Post audit report to GitHub issue
        if: always()
        uses: actions/github-script@v7
        with:
          script: |
            const fs = require('fs');
            const path = require('path');
            const title = 'Full System Audit Report';
            const runUrl = `${context.serverUrl}/${context.repo.owner}/${context.repo.repo}/actions/runs/${context.runId}`;
            const mdPath = path.join(process.cwd(), 'downloads', 'full-system-audit.md');
            const jsonPath = path.join(process.cwd(), 'downloads', 'full-system-audit.json');
            let reportMd = fs.existsSync(mdPath) ? fs.readFileSync(mdPath, 'utf8') : '# Full System Audit\n\nReport file was not generated. Open the workflow logs.';
            let status = '${{ job.status }}';
            let summary = '';
            if (fs.existsSync(jsonPath)) {
              try {
                const data = JSON.parse(fs.readFileSync(jsonPath, 'utf8'));
                status = data.ok ? 'PASS' : 'FAIL';
                summary = `\n\n## Machine Summary\n\n- Status: ${status}\n- Commands: ${data.summary?.commandCount ?? 'unknown'}\n- Failed commands: ${data.summary?.failedCommands ?? 'unknown'}\n- Systems checked: ${data.summary?.systemCount ?? 'unknown'}\n- Failed systems: ${data.summary?.failedSystems ?? 'unknown'}\n`;
              } catch {}
            }
            if (reportMd.length > 45000) reportMd = reportMd.slice(0, 45000) + '\n\n_Report truncated. Open the workflow artifact for the full report._';
            const body = `# Latest Full System Audit\n\nStatus: **${status}**\n\nWorkflow run: ${runUrl}\n\nArtifacts: open the workflow run and download **full-system-audit-reports**.\n${summary}\n---\n\n${reportMd}`;
            const search = await github.rest.search.issuesAndPullRequests({
              q: `repo:${context.repo.owner}/${context.repo.repo} is:issue is:open in:title "${title}"`
            });
            if (search.data.items.length) {
              const issue_number = search.data.items[0].number;
              await github.rest.issues.update({ owner: context.repo.owner, repo: context.repo.repo, issue_number, body });
              await github.rest.issues.createComment({ owner: context.repo.owner, repo: context.repo.repo, issue_number, body: `Full System Audit finished with **${status}**.\n\nRun: ${runUrl}` });
            } else {
              await github.rest.issues.create({ owner: context.repo.owner, repo: context.repo.repo, title, body, labels: ['full-system-audit'] });
            }
