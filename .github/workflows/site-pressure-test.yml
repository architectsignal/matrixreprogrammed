name: Site Pressure Test

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  schedule:
    - cron: '17 5 * * *'
  workflow_dispatch:

jobs:
  build-and-pressure-test:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Install dependencies
        run: npm install

      - name: Build full site and run pressure tests
        run: npm run build

      - name: Verify core phase outputs
        run: |
          test -f power-atlas.html
          test -f evidence-vault.html
          test -f book-universe.html
          test -f answer-engine.html
          test -f network-map-index.html
          test -f conversion-funnel.html
          test -f trust-center.html
          test -f distribution-center.html
          test -f sales-ladder.html
          test -f update-monitor.html
          test -f authority-hub.html
          test -f schema-index.html
          test -f download-center.html
          test -f feed-center.html
          test -f share-center.html
          test -f launch-room.html
          test -f offer-center.html
          test -f optin-center.html
          grep -q "THE PUBLIC-RECORD MAP OF HIDDEN POWER" power-atlas.html
          grep -q "SOURCES BEFORE SIGNALS" evidence-vault.html
          grep -q "BOOKS THAT ROUTE INTO THE MACHINE" book-universe.html
          grep -q "SCHEMA INDEX" schema-index.html
          grep -q "DOWNLOAD CENTER" download-center.html
          grep -q "FEED CENTER" feed-center.html
          grep -q "SHARE CENTER" share-center.html
          grep -q "LAUNCH ROOM" launch-room.html
          grep -q "OFFER CENTER" offer-center.html
          grep -q "OPT-IN CENTER" optin-center.html

      - name: Verify generated detail pages
        run: |
          test -f atlas-cia.html
          test -f source-cia-reading-room.html
          test -f answer-deep-state.html
          test -f map-intelligence-network.html
          test -f funnel-black-file.html
          test -f path-intelligence-dossiers.html
          test -f authority-intelligence.html
          test -f dossier-pack-black-file-starter.html
          test -f downloads/dossier-pack-black-file-starter.json
          test -f feed-main-signal.html
          test -f feeds/main-signal.xml
          test -f feeds/main-signal-atom.xml
          test -f feeds/main-signal.json
          test -f share-kit-black-file-starter.html
          test -f downloads/share-kit-black-file-starter.txt
          test -f campaign-black-file-launch.html
          test -f downloads/campaign-black-file-launch.json
          test -f downloads/campaign-black-file-launch.md
          test -f offer-starter-library.html
          test -f offer-full-archive.html
          test -f downloads/offer-starter-library.json
          test -f downloads/offer-starter-library.md
          test -f optin-black-file-brief.html
          test -f downloads/lead-magnet-black-file-brief.json
          test -f downloads/lead-magnet-black-file-brief.md

      - name: Verify Phase 13 Schema Engine output
        run: |
          test -f data/schema-engine.json
          test -f schema-site-graph.html
          test -f site-graph.json
          test -f claim-taxonomy.json
          test -f crawler-map.json
          grep -q "SCHEMA ENGINE STATUS" schema-index.html
          grep -q "phase-thirteen-schema-engine" index.html
          grep -q "schema-index.html" search-index.json
          grep -q "site-graph.json" llms.txt

      - name: Verify Phase 14 Dossier Pack output
        run: |
          test -f data/dossier-packs.json
          grep -q "DOSSIER PACK ENGINE STATUS" download-center.html
          test -f dossier-pack-trust-evidence.html
          test -f downloads/dossier-pack-trust-evidence.md
          grep -q "phase-fourteen-dossier-pack-engine" index.html
          grep -q "download-center.html" search-index.json
          grep -q "download-center.html" llms.txt

      - name: Verify Phase 15 Feed Discovery output
        run: |
          test -f data/feed-engine.json
          grep -q "FEED ENGINE STATUS" feed-center.html
          test -f feed-evidence-trust.html
          grep -q "<rss version=\"2.0\">" feeds/main-signal.xml
          grep -q "<feed xmlns=\"http://www.w3.org/2005/Atom\">" feeds/main-signal-atom.xml
          grep -q "jsonfeed.org/version/1.1" feeds/main-signal.json
          grep -q "phase-fifteen-feed-engine" index.html
          grep -q "feed-center.html" search-index.json
          grep -q "feed-center.html" llms.txt

      - name: Verify Phase 16 Share Kit output
        run: |
          test -f data/share-kits.json
          grep -q "SHARE KIT ENGINE STATUS" share-center.html
          test -f share-kit-trust-evidence.html
          grep -q "HOOKS" downloads/share-kit-trust-evidence.txt
          grep -q "phase-sixteen-share-kit-engine" index.html
          grep -q "share-center.html" search-index.json
          grep -q "share-center.html" llms.txt

      - name: Verify Phase 17 Campaign Calendar output
        run: |
          test -f data/campaign-calendar.json
          test -f launch-room.html
          grep -q "LAUNCH ROOM" launch-room.html
          grep -q "LAUNCH ROOM STATUS" launch-room.html
          test -f campaign-black-file-launch.html
          test -f campaign-intelligence-dossiers-push.html
          test -f campaign-crime-state-overlap-push.html
          test -f campaign-trust-evidence-push.html
          test -f downloads/campaign-black-file-launch.json
          test -f downloads/campaign-black-file-launch.md
          grep -q "CAMPAIGN ROOM" campaign-black-file-launch.html
          grep -q "Campaign Boundary" campaign-trust-evidence-push.html
          grep -q "## 7-Day Campaign" downloads/campaign-trust-evidence-push.md
          grep -q "phase-seventeen-campaign-calendar-engine" index.html
          grep -q "phase-seventeen-campaign-calendar-engine" share-center.html
          grep -q "launch-room.html" search-index.json
          grep -q "launch-room.html" llms.txt

      - name: Verify Phase 18 Offer Stack output
        run: |
          test -f data/offer-stack.json
          test -f offer-center.html
          grep -q "OFFER CENTER" offer-center.html
          grep -q "OFFER STACK STATUS" offer-center.html
          test -f offer-starter-library.html
          test -f offer-dog-architect-collector.html
          test -f offer-intelligence-dossiers.html
          test -f offer-full-archive.html
          test -f downloads/offer-starter-library.json
          test -f downloads/offer-starter-library.md
          grep -q "OFFER ROOM" offer-starter-library.html
          grep -q "Offer Boundary" offer-full-archive.html
          grep -q "## Offer Steps" downloads/offer-full-archive.md
          grep -q "phase-eighteen-offer-stack-engine" index.html
          grep -q "phase-eighteen-offer-stack-engine" sales-ladder.html
          grep -q "offer-center.html" search-index.json
          grep -q "offer-center.html" llms.txt

      - name: Verify Phase 19 Lead Magnet output
        run: |
          test -f data/lead-magnets.json
          test -f optin-center.html
          grep -q "OPT-IN CENTER" optin-center.html
          grep -q "LEAD MAGNET ENGINE STATUS" optin-center.html
          test -f optin-black-file-brief.html
          test -f optin-dog-architect-initiation.html
          test -f optin-intelligence-files-brief.html
          test -f optin-full-archive-map.html
          test -f downloads/lead-magnet-black-file-brief.json
          test -f downloads/lead-magnet-black-file-brief.md
          grep -q "OPT-IN ROOM" optin-black-file-brief.html
          grep -q "data-netlify=\"true\"" optin-black-file-brief.html
          grep -q "lead-black-file-brief" optin-black-file-brief.html
          grep -q "phase-nineteen-lead-magnet-engine" index.html
          grep -q "phase-nineteen-lead-magnet-engine" offer-center.html
          grep -q "optin-center.html" search-index.json
          grep -q "optin-center.html" llms.txt

      - name: Verify Intel Desk generated output
        run: |
          grep -q "Latest 7 Days" news.html
          grep -q "Human Cost" news.html
          grep -q "BULLETIN ARCHIVE" intel-archive.html

      - name: Verify duplicate cleanup output
        run: |
          ! grep -q "Flagship Door" index.html
          ! grep -q "Rumble Channel Routes" videos.html
          ! grep -q "SIGNALS INCREASING RISK" timers.html
          ! grep -q "(b.keywords||[]).slice" search.js
          grep -q "Video Production Map" videos.html
          grep -q "Showing the strongest entry points" search.html
