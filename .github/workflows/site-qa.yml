name: Site QA

on:
  workflow_dispatch:
  push:
    branches:
      - main
    paths:
      - '**.html'
      - '**.css'
      - '**.js'
      - 'data/**'
      - 'scripts/**'
      - 'sitemap.xml'
      - 'robots.txt'
      - 'netlify.toml'
      - '.github/workflows/site-qa.yml'

permissions:
  contents: read

jobs:
  audit:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '24'

      - name: Generate book system
        run: node scripts/build-book-system.js

      - name: Generate homepage
        run: node scripts/build-homepage.js

      - name: Inject analytics
        run: node scripts/inject-analytics.js

      - name: Generate Black File PDF
        run: node scripts/build-black-file-pdf.js

      - name: Run site audit report
        run: node scripts/audit-site.js || echo "Site audit reported issues; build generation completed. Treat this as a cleanup report, not a deploy blocker during live polish."
