name: Unpack Matrix Reprogrammed Site Upgrade

on:
  workflow_dispatch:
  push:
    paths:
      - "matrixreprogrammed_epic_upgrade.zip"
      - ".github/workflows/unpack-site-upgrade.yml"

permissions:
  contents: write

jobs:
  unpack:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Unpack upgrade ZIP
        run: |
          if [ ! -f matrixreprogrammed_epic_upgrade.zip ]; then
            echo "matrixreprogrammed_epic_upgrade.zip not found"
            exit 1
          fi
          unzip -o matrixreprogrammed_epic_upgrade.zip -d .
          rm -f README_DEPLOY.txt _redirects

      - name: Commit unpacked site files
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add index.html styles.css books.html dog-the-architect.html intelligence-dossiers.html crime-dossiers.html masonic-esoteric.html black-file.html codex.html transmissions.html podcast.html members.html contact.html
          if git diff --cached --quiet; then
            echo "No site file changes to commit"
          else
            git commit -m "Unpack Matrix Reprogrammed epic upgrade"
            git push
          fi
