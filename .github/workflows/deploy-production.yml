name: Deploy Production

on:
  workflow_dispatch:
    inputs:
      confirm:
        description: 'Type DEPLOY to confirm production release after tests pass'
        required: true
        default: 'NO'
  push:
    branches: [ main ]

permissions:
  contents: write
  actions: read

concurrency:
  group: production-deploy
  cancel-in-progress: false

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: 'true'

jobs:
  deploy:
    name: Guarded Cloudflare production deploy
    runs-on: ubuntu-latest
    timeout-minutes: 30
    if: ${{ github.event_name == 'push' || (github.event_name == 'workflow_dispatch' && github.event.inputs.confirm == 'DEPLOY') }}

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: '24'

      - name: Install dependencies
        run: npm install

      - name: Build and pressure test before deploy
        run: npm run build

      - name: Atlas Layers test
        run: npm run pressure-test:atlas-layers

      - name: Migration Flow test
        run: npm run pressure-test:migration-flow

      - name: Risk Clocks and Forum Cloudflare test
        run: npm run pressure-test:global-risk-clocks

      - name: Cloudflare Worker asset route test
        run: npm run pressure-test:cloudflare

      - name: Update cadence audit
        run: node scripts/update-cadence-test.js

      - name: Verify Cloudflare secrets
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
        run: |
          if [ -z "$CLOUDFLARE_API_TOKEN" ]; then
            echo "::error::CLOUDFLARE_API_TOKEN secret is missing. Add it in GitHub Settings > Secrets and variables > Actions."
            exit 1
          fi
          if [ -z "$CLOUDFLARE_ACCOUNT_ID" ]; then
            echo "::error::CLOUDFLARE_ACCOUNT_ID secret is missing. Add it in GitHub Settings > Secrets and variables > Actions."
            exit 1
          fi
          echo "Cloudflare secrets present."

      - name: Deploy to Cloudflare Worker
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
        run: |
          set -o pipefail
          echo "Deploying Cloudflare Worker with bundled _site assets for matrixreprogrammed..."
          npx wrangler deploy

      - name: Verify live Cloudflare site
        env:
          SITE_URL: https://matrixreprogrammed.com
          EXPECTED_BUILD_SHA: ${{ github.sha }}
        run: |
          set -o pipefail
          for attempt in 1 2 3 4 5 6; do
            echo "Live verification attempt $attempt of 6"
            if npm run verify-live; then
              exit 0
            fi
            sleep 15
          done
          echo "::error::Live Cloudflare verification failed after retries. See live-site-verification-report.json artifact."
          exit 1

      - name: Upload live verification report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: live-site-verification-report
          path: live-site-verification-report.json
          if-no-files-found: ignore
          retention-days: 14
