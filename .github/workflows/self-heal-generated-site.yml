name: Self-Heal Generated Site Manual Backup

on:
  workflow_dispatch:

permissions:
  contents: write
  actions: read

concurrency:
  group: self-heal-generated-site-manual-backup
  cancel-in-progress: false

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: 'true'

jobs:
  self-heal:
    name: Manual rebuild, repair, audit, and commit backup
    runs-on: ubuntu-latest
    timeout-minutes: 45

    steps:
      - name: Checkout main
        uses: actions/checkout@v4
        with:
          ref: main
          fetch-depth: 0

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '24'

      - name: Install dependencies
        run: npm install

      - name: Rebuild and repair generated outputs
        run: |
          npm run build
          node scripts/repair-search-system.js
          node scripts/repair-generated-site-artifacts.js
          node scripts/ensure-shared-assets.js
          npm run repair-generated

      - name: Full manual self-heal audit
        run: |
          npm run audit:master:postbuild
          npm run link-audit
          npm run pressure-test:ask-matrix
          npm run pressure-test:cloudflare
          node scripts/site-function-harmony-test.js
          node scripts/forum-board-split-test.js

      - name: Commit regenerated public outputs if changed
        run: |
          set +e
          git config user.name "matrix-self-heal-bot"
          git config user.email "actions@users.noreply.github.com"
          git status --short
          git add -A *.html *.css *.js sitemap.xml robots.txt llms.txt search-index.json site-graph.json claim-taxonomy.json crawler-map.json deploy-status.json deploy-health.json || true
          git add -A data downloads feeds _site || true
          if git diff --cached --quiet; then
            echo "No regenerated output changes to commit."
            exit 0
          fi
          git commit -m "Manual self-heal generated site outputs [deploy]"
          git push || (git pull --rebase --autostash origin main && git push)

      - name: Upload self-heal reports
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: self-heal-generated-site-manual-backup-reports
          path: |
            downloads/site-wide-function-audit.json
            downloads/site-wide-function-audit.md
            site-quality-report.html
            site-freshness-report.html
            data/site-quality-report.json
            data/site-freshness-report.json
            deploy-status.json
            deploy-health.json
            downloads/deploy-status.json
            downloads/deploy-health.json
            downloads/generated-site-repair-report.json
          if-no-files-found: ignore
          retention-days: 14
