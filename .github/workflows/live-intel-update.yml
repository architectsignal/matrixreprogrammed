name: Live Intel Update

on:
  schedule:
    # Weekly automatic scan: Sunday 05:17 UTC. Commits only when live intel or figure-freshness data meaningfully changes.
    - cron: '17 5 * * 0'
  workflow_dispatch:

permissions:
  contents: write

jobs:
  update-live-intel:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: '22'

      - name: Update live intelligence data
        run: node scripts/update-live-intel.js

      - name: Build live intelligence hub
        run: node scripts/build-live-intel-machine.js

      - name: Scan public pages for figure freshness
        run: node scripts/update-site-freshness-report.js

      - name: Validate live intelligence machine
        run: node scripts/live-intel-pressure-test.js

      - name: Commit updated intelligence data
        run: |
          git config user.name "matrix-intel-bot"
          git config user.email "actions@users.noreply.github.com"
          git add data/live-intel.json data/site-freshness-report.json downloads/site-freshness-report.md site-freshness-report.html
          if git diff --cached --quiet; then
            echo "No weekly intelligence or freshness changes to commit."
          else
            git commit -m "Update weekly live intelligence and freshness report"
            git push
          fi
