# Cloudflare Workers deployment configuration
# Production deploy path: GitHub Actions runs npm run build then npx wrangler deploy.
# The build command creates the static site in _site; src/worker.js handles backend routes and bundled assets.

name = "matrixreprogrammed"
main = "src/worker.js"
compatibility_date = "2026-06-25"
keep_vars = true

routes = [
  { pattern = "matrixreprogrammed.com/*", zone_name = "matrixreprogrammed.com" },
  { pattern = "www.matrixreprogrammed.com/*", zone_name = "matrixreprogrammed.com" }
]

[assets]
directory = "./_site"
binding = "ASSETS"
run_worker_first = true

# Public Signal Board storage.
# Cloudflare KV namespace title: matrixreprogrammed-forum-posts
[[kv_namespaces]]
binding = "FORUM_POSTS"
id = "99996d87016d4285a833707cbda5232f"
