name: Site Pressure Test

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  schedule:
    - cron: '17 5 * * *'
  workflow_dispatch:

jobs:
  build-and-pressure-test:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Install dependencies
        run: npm install

      - name: Build full site and run pressure tests
        run: npm run build

      - name: Verify Phase 1 pages exist
        run: |
          test -f power-atlas.html
          test -f evidence-vault.html
          test -f evidence-policy.html
          test -f network-maps.html
          grep -q "THE PUBLIC-RECORD MAP OF HIDDEN POWER" power-atlas.html
          grep -q "SOURCES BEFORE SIGNALS" evidence-vault.html
          grep -q "DARK CLAIMS NEED CLEAN SOURCES" evidence-policy.html
          grep -q "NO RED STRING WITHOUT LABELS" network-maps.html

      - name: Verify Phase 2 Power Atlas output
        run: |
          test -f data/power-atlas.json
          test -f atlas-index.html
          grep -q "ATLAS NODES" atlas-index.html
          grep -q "phase-two-atlas-engine" power-atlas.html
          test -f atlas-cia.html
          test -f atlas-epstein-records.html
          test -f atlas-blackwater.html
          grep -q "Source Boundary" atlas-cia.html
          grep -q "Relationship-Line Types" atlas-cia.html
          grep -q "Source Boundary" atlas-epstein-records.html
          grep -q "Relationship-Line Types" atlas-epstein-records.html

      - name: Verify Phase 3 Evidence Vault output
        run: |
          test -f data/evidence-vault.json
          test -f evidence-vault-index.html
          grep -q "SOURCE LANES" evidence-vault-index.html
          grep -q "phase-three-evidence-engine" evidence-vault.html
          test -f evidence-lane-court-records.html
          test -f evidence-lane-declassified-archives.html
          test -f evidence-lane-human-cost-sources.html
          test -f source-cia-reading-room.html
          test -f source-treasury-ofac.html
          test -f source-vaers.html
          grep -q "Source Boundary" evidence-lane-court-records.html
          grep -q "Source Boundary" evidence-lane-human-cost-sources.html
          grep -q "Use For" source-cia-reading-room.html
          grep -q "Boundary" source-vaers.html

      - name: Verify Phase 4 Book Universe output
        run: |
          test -f book-universe.html
          grep -q "BOOKS THAT ROUTE INTO THE MACHINE" book-universe.html
          grep -q "BOOK UNIVERSE STATUS" book-universe.html
          grep -q "Signal Board" book-universe.html
          grep -q "phase-four-book-universe" book-cia.html
          grep -q "Connected Power Atlas Nodes" book-cia.html
          grep -q "Connected Evidence Vault Lanes" book-cia.html
          grep -q "phase-four-book-universe" book-as-above-so-below.html
          grep -q "forum.html" index.html

      - name: Verify Intel Desk generated output
        run: |
          grep -q "Latest 7 Days" news.html
          grep -q "Human Cost" news.html
          grep -q "Migration / Irregular Immigration" news.html
          grep -q "Vaccines" news.html
          grep -q "BULLETIN ARCHIVE" intel-archive.html

      - name: Verify duplicate cleanup output
        run: |
          ! grep -q "Flagship Door" index.html
          ! grep -q "Rumble Channel Routes" videos.html
          ! grep -q "SIGNALS INCREASING RISK" timers.html
          grep -q "Video Production Map" videos.html
          grep -q "Showing the strongest entry points" search.html
