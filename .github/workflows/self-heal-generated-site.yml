name: Self-Heal Generated Site

on:
  workflow_run:
    workflows:
      - Site QA
      - Site Pressure Test
      - Site-Wide Master Audit
      - pages build and deployment
      - Deep Site Pressure Test
    types:
      - completed
  workflow_dispatch:

permissions:
  contents: write
  actions: read

concurrency:
  group: self-heal-generated-site-${{ github.event.workflow_run.head_branch || github.ref }}
  cancel-in-progress: true

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: 'true'

jobs:
  self-heal:
    name: Rebuild generated outputs, audit twice, commit only if clean
    runs-on: ubuntu-latest
    timeout-minutes: 45
    if: >-
      github.event_name == 'workflow_dispatch' ||
      (github.event.workflow_run.conclusion == 'failure' &&
       github.event.workflow_run.head_branch == 'main' &&
       !contains(github.event.workflow_run.head_commit.message, 'Self-heal generated site outputs') &&
       !contains(github.event.workflow_run.head_commit.message, 'Daily site intelligence refresh [deploy]'))

    steps:
      - name: Checkout main
        uses: actions/checkout@v4
        with:
          ref: main
          fetch-depth: 0

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '24'

      - name: Install dependencies
        run: npm install

      - name: First full rebuild
        run: npm run build

      - name: First postbuild master audit
        run: npm run audit:master:postbuild

      - name: First link audit
        run: npm run link-audit

      - name: Critical pressure tests
        run: |
          npm run pressure-test:live-intel
          npm run pressure-test:migration-flow
          npm run pressure-test:epstein-watch
          npm run pressure-test:cloudflare
          npm run pressure-test:ten
          npm run pressure-test:intel-analytics

      - name: Second full rebuild to catch order-dependent overwrites
        run: npm run build

      - name: Second postbuild master audit
        run: npm run audit:master:postbuild

      - name: Second link audit
        run: npm run link-audit

      - name: Commit regenerated public outputs if changed
        run: |
          git config user.name "matrix-self-heal-bot"
          git config user.email "actions@users.noreply.github.com"
          git status --short
          git add -A *.html *.css *.js sitemap.xml robots.txt llms.txt search-index.json site-graph.json claim-taxonomy.json crawler-map.json deploy-status.json || true
          git add -A data downloads feeds _site || true
          if git diff --cached --quiet; then
            echo "No regenerated output changes to commit."
          else
            git commit -m "Self-heal generated site outputs [deploy]"
            git push
          fi

      - name: Upload self-heal reports
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: self-heal-generated-site-reports
          path: |
            downloads/site-wide-function-audit.json
            downloads/site-wide-function-audit.md
            site-quality-report.html
            site-freshness-report.html
            data/site-quality-report.json
            data/site-freshness-report.json
            deploy-status.json
            downloads/deploy-status.json
          if-no-files-found: ignore
          retention-days: 14
