name: Rebuild Book System

on:
  workflow_dispatch:
  push:
    paths:
      - "data/books.json"
      - "scripts/build-book-system.js"
      - ".github/workflows/rebuild-book-system.yml"

permissions:
  contents: write

jobs:
  rebuild:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '24'

      - name: Generate book pages and search system
        run: node scripts/build-book-system.js

      - name: Commit generated book system
        run: |
          git config user.name "matrix-reprogrammed-bot"
          git config user.email "actions@github.com"
          git add book-*.html start-here.html search.html search.js search-index.json
          if git diff --cached --quiet; then
            echo "No generated book system changes to commit."
          else
            git commit -m "Rebuild Matrix Reprogrammed book system"
            git push
          fi
