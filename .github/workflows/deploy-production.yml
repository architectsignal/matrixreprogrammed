name: Deploy Production

on:
  workflow_dispatch:
    inputs:
      confirm:
        description: 'Type DEPLOY to confirm production release after tests pass'
        required: true
        default: 'NO'
  push:
    branches: [ main ]

permissions:
  contents: write
  actions: read

concurrency:
  group: production-deploy
  cancel-in-progress: false

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: 'true'

jobs:
  deploy:
    name: Guarded Cloudflare production deploy
    runs-on: ubuntu-latest
    timeout-minutes: 30
    if: ${{ github.event_name == 'push' || (github.event_name == 'workflow_dispatch' && github.event.inputs.confirm == 'DEPLOY') }}

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: '24'

      - name: Install dependencies
        run: npm install

      - name: Patch newsletter Worker before build
        run: node scripts/patch-worker-newsletter-system.js

      - name: Build generated site
        run: npm run build

      - name: Repatch newsletter Worker after build
        run: node scripts/patch-worker-newsletter-system.js

      - name: Patch newsletter capture UI
        run: node scripts/patch-newsletter-capture-ui.js

      - name: Archive old Intel updates to vault
        run: node scripts/archive-intel-drops-to-vault.js

      - name: Audit branded downloads
        run: node scripts/brand-downloads-audit.js

      - name: Mission-critical growth gate
        run: node scripts/mission-critical-growth-test.js

      - name: Atlas Layers test
        run: npm run pressure-test:atlas-layers

      - name: Migration Flow test
        run: npm run pressure-test:migration-flow

      - name: Risk Clocks and Forum Cloudflare test
        run: npm run pressure-test:global-risk-clocks

      - name: Cloudflare Worker asset route test
        run: |
          node scripts/patch-worker-newsletter-system.js
          node scripts/patch-newsletter-capture-ui.js
          npm run pressure-test:cloudflare

      - name: Update cadence audit
        run: node scripts/update-cadence-test.js

      - name: Verify Cloudflare secrets
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
        run: |
          if [ -z "$CLOUDFLARE_API_TOKEN" ]; then
            echo "::error::CLOUDFLARE_API_TOKEN secret is missing. Add it in GitHub Settings > Secrets and variables > Actions."
            exit 1
          fi
          if [ -z "$CLOUDFLARE_ACCOUNT_ID" ]; then
            echo "::error::CLOUDFLARE_ACCOUNT_ID secret is missing. Add it in GitHub Settings > Secrets and variables > Actions."
            exit 1
          fi
          echo "Cloudflare secrets present."

      - name: Deploy to Cloudflare Worker
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
        shell: bash
        run: |
          set -o pipefail
          mkdir -p downloads
          echo "Deploying Cloudflare Worker with bundled _site assets for matrixreprogrammed..." | tee downloads/wrangler-deploy.log
          npx --yes wrangler@latest deploy 2>&1 | tee -a downloads/wrangler-deploy.log
          status=${PIPESTATUS[0]}
          echo "Wrangler exit status: $status" | tee -a downloads/wrangler-deploy.log
          exit "$status"

      - name: Cloudflare deployment proof
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
          CLOUDFLARE_ZONE_NAME: matrixreprogrammed.com
          CLOUDFLARE_WORKER_NAME: matrixreprogrammed
          EXPECTED_BUILD_SHA: ${{ github.sha }}
        run: |
          set -o pipefail
          node scripts/cloudflare-deploy-proof.js

      - name: Advisory public live verification
        env:
          SITE_URL: https://www.matrixreprogrammed.com
          EXPECTED_BUILD_SHA: ${{ github.sha }}
          ALLOW_CLOUDFLARE_CHALLENGE_IN_CI: 'true'
        run: |
          set -o pipefail
          if npm run verify-live; then
            echo "Public live verification passed or was challenge-accepted in CI."
          else
            echo "::warning::Public live verification failed. The API deploy proof already passed; inspect live-site-verification-report.json."
          fi

      - name: Upload deployment reports
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: deployment-proof-and-live-reports
          path: |
            downloads/wrangler-deploy.log
            cloudflare-deploy-proof-report.json
            cloudflare-domain-repair-report.json
            live-site-verification-report.json
            downloads/intel-drop-vault.json
            downloads/intel-drop-vault.md
            downloads/downloads-index.json
            downloads/downloads-index.md
            downloads/update-cadence-report.json
            downloads/update-cadence-report.md
            downloads/mission-critical-growth-report.json
            downloads/mission-critical-growth-report.md
          if-no-files-found: ignore
          retention-days: 14
