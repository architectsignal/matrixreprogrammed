name: Daily Content Refresh

on:
  schedule:
    # Daily content refresh: 04:17 UTC = 06:17 France summer / 05:17 France winter.
    # This runs before the 05:17 UTC pressure-test window.
    - cron: '17 4 * * *'
  workflow_dispatch:

permissions:
  contents: write

concurrency:
  group: daily-content-refresh
  cancel-in-progress: true

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: 'true'

jobs:
  daily-refresh:
    name: Daily source refresh, build, test, commit, and deploy trigger
    runs-on: ubuntu-latest
    timeout-minutes: 30

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: '24'

      - name: Install dependencies
        run: npm install

      - name: Refresh public-source data before build
        run: |
          node scripts/update-live-intel.js
          node scripts/update-seven-day-intel.js
          node scripts/build-intel-desk.js
          node scripts/enhance-epstein-watch.js
          node scripts/build-epstein-evidence-ladder.js
          node scripts/build-epstein-timeline-map.js
          node scripts/patch-homepage-alerts.js

      - name: Build full site and run protected pressure tests
        run: npm run build

      - name: Daily targeted freshness guardrails
        run: |
          node scripts/live-intel-pressure-test.js
          node scripts/epstein-watch-pressure-test.js
          node scripts/premier-resource-pressure-test.js
          node scripts/figure-source-rules-pressure-test.js
          node scripts/migration-flow-test.js
          node scripts/global-risk-clocks-test.js
          node scripts/update-cadence-test.js

      - name: Commit daily public-content updates if changed
        run: |
          git config user.name "matrix-daily-update-bot"
          git config user.email "actions@users.noreply.github.com"
          git status --short
          git add -A data downloads feeds || true
          git add -A daily-drop.html network-search.html live-intel.html intel-archive.html news.html epstein-files.html timers.html migration-flow.html site-freshness-report.html site-quality-report.html download-center.html sitemap.xml llms.txt search-index.json site-graph.json claim-taxonomy.json crawler-map.json robots.txt || true
          if git diff --cached --quiet; then
            echo "No daily public-content changes to commit."
          else
            git commit -m "Daily site intelligence refresh [deploy]"
            git push
          fi

      - name: Upload daily refresh artifact
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: daily-content-refresh-artifact
          path: |
            daily-drop.html
            network-search.html
            live-intel.html
            intel-archive.html
            epstein-files.html
            news.html
            timers.html
            migration-flow.html
            site-freshness-report.html
            site-quality-report.html
            data/update-cadence-policy.json
            data/live-intel.json
            data/global-risk-clocks.json
            data/migration-flow-panel.json
            data/epstein-homepage-alerts.json
            downloads/daily-drop.json
            downloads/daily-drop.md
            downloads/network-search.json
            downloads/network-search.md
            downloads/live-intel-latest.json
            downloads/live-intel-latest.md
            downloads/seven-day-intel.json
            downloads/epstein-source-watch.json
            downloads/epstein-source-watch.md
          if-no-files-found: ignore
          retention-days: 7
