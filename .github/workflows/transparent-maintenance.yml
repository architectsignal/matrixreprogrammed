name: Transparent Maintenance

on:
  workflow_dispatch:
  schedule:
    - cron: '23 7 * * *'
  push:
    branches: [ main ]
    paths:
      - '.github/update-triggers/transparent-maintenance.txt'
      - '.github/update-triggers/all-auto-updates.txt'

permissions:
  contents: write
  actions: read

concurrency:
  group: transparent-maintenance
  cancel-in-progress: false

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: 'true'

jobs:
  maintain:
    name: Build, report, commit, and run advisory health checks
    runs-on: ubuntu-latest
    timeout-minutes: 45

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}
          fetch-depth: 0

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: '24'

      - name: Install dependencies
        run: npm install

      - name: Build site and generated trackers
        run: npm run build

      - name: Repair generated artifacts before reports
        run: |
          node scripts/repair-search-system.js
          node scripts/repair-generated-site-artifacts.js
          node scripts/ensure-shared-assets.js

      - name: Generate transparent maintenance report
        run: node scripts/build-transparent-maintenance-report.js

      - name: Commit generated maintenance outputs
        continue-on-error: true
        run: |
          set +e
          git config user.name "matrix-maintenance-bot"
          git config user.email "actions@github.com"
          git add downloads/transparent-maintenance-report.json downloads/transparent-maintenance-report.md downloads/site-intelligence-core.json downloads/site-intelligence-core.md downloads/site-intelligence-graph.json downloads/global-risk-clocks-linked.json downloads/policy-convergence-timer-map.json downloads/dark-speculation-deep-dossiers.json downloads/dark-speculation-deep-dossiers.md data/global-risk-clocks.json search-index.json search.html search.js llms.txt sitemap.xml dark-speculation-lab.html control-system-tracker.html site-intelligence-core.html deploy-health.json deploy-status.json downloads/deploy-health.json downloads/deploy-status.json downloads/search-system-repair-report.json downloads/generated-site-repair-report.json || true
          if git diff --cached --quiet; then
            echo "No generated maintenance changes to commit."
            exit 0
          fi
          git commit -m "Transparent scheduled maintenance report [deploy]"
          commit_status=$?
          if [ "$commit_status" -ne 0 ]; then
            echo "Maintenance commit failed but reports were uploaded as artifacts. Continuing so maintenance does not block production."
            exit 0
          fi
          for attempt in 1 2 3; do
            git push && exit 0
            echo "Push failed on attempt $attempt. Rebasing against latest main and retrying."
            git fetch origin main || true
            git pull --rebase --autostash origin main || { git rebase --abort || true; git reset --hard HEAD || true; }
            sleep 2
          done
          echo "Maintenance push could not be completed after retries. Reports remain available in workflow artifacts. Continuing."
          exit 0

      - name: Public content scrub
        continue-on-error: true
        run: node scripts/public-content-scrub-test.js

      - name: Matrix Brain health gate
        continue-on-error: true
        run: node scripts/matrix-brain-health-test.js

      - name: Control system health gate
        continue-on-error: true
        run: node scripts/control-system-health-test.js

      - name: Upload maintenance reports
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: transparent-maintenance-reports
          path: |
            downloads/transparent-maintenance-report.json
            downloads/transparent-maintenance-report.md
            downloads/site-intelligence-core.json
            downloads/site-intelligence-core.md
            downloads/site-intelligence-graph.json
            public-content-scrub-report.json
            site-brain-health-report.json
            downloads/site-wide-function-audit.json
            downloads/site-wide-function-audit.md
            live-site-verification-report.json
          if-no-files-found: ignore
          retention-days: 14
