name: Site QA

on:
  workflow_dispatch:
  push:
    branches:
      - main
    paths:
      - '**.html'
      - '**.css'
      - '**.js'
      - 'data/**'
      - 'scripts/**'
      - 'sitemap.xml'
      - 'robots.txt'
      - 'netlify.toml'
      - '.github/workflows/site-qa.yml'
      - '.github/workflows/daily-update-check.yml'
      - '.github/workflows/weekly-update-check.yml'
      - '.github/workflows/monthly-archive-audit.yml'

permissions:
  contents: read

concurrency:
  group: site-qa-${{ github.ref }}
  cancel-in-progress: true

jobs:
  audit:
    runs-on: ubuntu-latest
    timeout-minutes: 25
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '24'

      - name: Install dependencies
        run: npm install

      - name: Build complete site before audit
        run: npm run build

      - name: Run site audit report on built output
        run: node scripts/audit-site.js
