name: Matrix Reprogrammed Production Deploy

on:
  push:
    branches:
      - main
  workflow_dispatch:

concurrency:
  group: matrixreprogrammed-production
  cancel-in-progress: false

jobs:
  build-guard-deploy:
    name: Build, guard, and deploy Worker assets
    runs-on: ubuntu-latest
    timeout-minutes: 30
    permissions:
      contents: read
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: '22'

      - name: Install dependencies
        run: npm install --no-audit --no-fund

      - name: Build site and Worker assets
        run: npm run build

      - name: Production deploy guard
        run: node scripts/production-deploy-guard.js

      - name: Confirm Cloudflare token is configured
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
        run: |
          if [ -z "$CLOUDFLARE_API_TOKEN" ]; then
            echo "CLOUDFLARE_API_TOKEN secret is missing. Build and guards passed, but deployment is blocked."
            exit 1
          fi
          echo "Cloudflare API token is configured."

      - name: Deploy to Cloudflare Workers with bundled _site assets
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
        run: npx wrangler@latest deploy

      - name: Deployment summary
        run: |
          echo "Production deployment completed."
          echo "Built _site assets, verified no marker leak, verified Amazon fallback, and verified FORUM_POSTS routes before deploy."
