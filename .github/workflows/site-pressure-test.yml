name: Site Pressure Test

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  schedule:
    - cron: '17 5 * * *'
  workflow_dispatch:

jobs:
  build-and-pressure-test:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Install dependencies
        run: npm install

      - name: Build full site and run pressure tests
        run: npm run build

      - name: Verify core phase outputs
        run: |
          test -f power-atlas.html
          test -f evidence-vault.html
          test -f evidence-policy.html
          test -f network-maps.html
          test -f atlas-index.html
          test -f evidence-vault-index.html
          test -f book-universe.html
          test -f answer-engine.html
          test -f network-map-index.html
          test -f conversion-funnel.html
          test -f trust-center.html
          test -f distribution-center.html
          test -f sales-ladder.html
          test -f update-monitor.html
          test -f authority-hub.html
          grep -q "THE PUBLIC-RECORD MAP OF HIDDEN POWER" power-atlas.html
          grep -q "SOURCES BEFORE SIGNALS" evidence-vault.html
          grep -q "BOOKS THAT ROUTE INTO THE MACHINE" book-universe.html
          grep -q "ANSWER ENGINE" answer-engine.html
          grep -q "NETWORK MAP INDEX" network-map-index.html
          grep -q "CONVERSION FUNNEL" conversion-funnel.html
          grep -q "TRUST CENTER" trust-center.html
          grep -q "DISTRIBUTION CENTER" distribution-center.html
          grep -q "READER PATHS" sales-ladder.html
          grep -q "UPDATE MONITOR" update-monitor.html
          grep -q "AUTHORITY HUB" authority-hub.html

      - name: Verify generated detail pages
        run: |
          test -f atlas-cia.html
          test -f atlas-epstein-records.html
          test -f source-cia-reading-room.html
          test -f source-treasury-ofac.html
          test -f answer-deep-state.html
          test -f answer-mkultra.html
          test -f map-intelligence-network.html
          test -f map-crime-state-overlap.html
          test -f map-war-machine.html
          test -f funnel-black-file.html
          test -f trust-privacy-policy.html
          test -f trust-source-methodology.html
          test -f distribution-shorts.html
          test -f distribution-podcast.html
          test -f path-dog-architect.html
          test -f path-intelligence-dossiers.html
          test -f update-lane-intel-desk.html
          test -f update-lane-evidence-vault.html
          test -f authority-elite-power.html
          test -f authority-intelligence.html
          test -f authority-evidence-trust.html

      - name: Verify Phase 13 Schema Engine output
        run: |
          test -f data/schema-engine.json
          test -f schema-index.html
          test -f schema-site-graph.html
          test -f schema-claim-taxonomy.html
          test -f schema-crawler-map.html
          test -f site-graph.json
          test -f claim-taxonomy.json
          test -f crawler-map.json
          grep -q "SCHEMA INDEX" schema-index.html
          grep -q "SCHEMA ENGINE STATUS" schema-index.html
          grep -q "Route Types" schema-index.html
          grep -q "Claim Labels" schema-index.html
          grep -q "MACHINE PAGE" schema-site-graph.html
          grep -q "application/ld+json" schema-crawler-map.html
          grep -q "phase-thirteen-schema-engine" index.html
          grep -q "phase-thirteen-schema-engine" authority-hub.html
          grep -q "phase-thirteen-schema-engine" trust-center.html
          grep -q "schema-index.html" search-index.json
          grep -q "schema-index.html" llms.txt
          grep -q "site-graph.json" llms.txt

      - name: Verify Intel Desk generated output
        run: |
          grep -q "Latest 7 Days" news.html
          grep -q "Human Cost" news.html
          grep -q "Migration / Irregular Immigration" news.html
          grep -q "Vaccines" news.html
          grep -q "BULLETIN ARCHIVE" intel-archive.html

      - name: Verify duplicate cleanup output
        run: |
          ! grep -q "Flagship Door" index.html
          ! grep -q "Rumble Channel Routes" videos.html
          ! grep -q "SIGNALS INCREASING RISK" timers.html
          ! grep -q "(b.keywords||[]).slice" search.js
          grep -q "Video Production Map" videos.html
          grep -q "Showing the strongest entry points" search.html
