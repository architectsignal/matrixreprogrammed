name: Weekly D.O.G Video Package Manual Backup

on:
  workflow_dispatch:

permissions:
  contents: write

env:
  ELEVENLABS_MODEL_ID: ${{ secrets.ELEVENLABS_MODEL_ID }}

jobs:
  weekly-video:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}
          fetch-depth: 0

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '24'

      - name: Install video rendering tools
        run: |
          sudo apt-get update
          sudo apt-get install -y ffmpeg librsvg2-bin

      - name: Generate weekly video package files
        env:
          ELEVENLABS_API_KEY: ${{ secrets.ELEVENLABS_API_KEY }}
          ELEVENLABS_VOICE_ID: ${{ secrets.ELEVENLABS_VOICE_ID }}
        run: |
          node scripts/intel-drop-engine.js
          node scripts/build-weekly-dog-video-package.js
          node scripts/generate-weekly-voiceover.js
          node scripts/render-weekly-mp4.js

      - name: Upload weekly video package artifact
        uses: actions/upload-artifact@v4
        with:
          name: weekly-dog-video-package-manual-backup
          path: |
            video-packages/**/package.md
            video-packages/**/package.json
            video-packages/**/narration.txt
            video-packages/**/poster.svg
            video-packages/**/scene-*.svg
            video-packages/**/scene-*.png
            video-packages/**/voiceover.mp3
            video-packages/**/weekly-dog-transmission.mp4
          retention-days: 14

      - name: Commit weekly video package metadata
        run: |
          set +e
          git config user.name "matrix-reprogrammed-bot"
          git config user.email "actions@github.com"
          git add data/latest-drop.json data/latest-video-package.json data/drops social/daily video-packages || true
          if git diff --cached --quiet; then
            echo "No weekly package changes to commit."
            exit 0
          fi
          git commit -m "Manual Weekly D.O.G video MP4 $(date -u +%F) [deploy]"
          git push || (git pull --rebase --autostash origin main && git push)
