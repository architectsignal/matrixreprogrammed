name: Weekly D.O.G Video Package

on:
  workflow_dispatch:
    inputs:
      facebook_video_mode:
        description: "Facebook video mode: live or dry-run"
        required: false
        default: "live"
  schedule:
    - cron: "30 8 * * 1"
  push:
    branches: [ main ]
    paths:
      - '.github/update-triggers/weekly-dog-video.txt'
      - '.github/update-triggers/all-auto-updates.txt'

permissions:
  contents: write

env:
  ELEVENLABS_MODEL_ID: ${{ secrets.ELEVENLABS_MODEL_ID }}
  FACEBOOK_VIDEO_MODE: ${{ github.event.inputs.facebook_video_mode || 'live' }}

jobs:
  weekly-video:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '24'

      - name: Install video rendering tools
        run: |
          sudo apt-get update
          sudo apt-get install -y ffmpeg librsvg2-bin

      - name: Generate fresh Intel Drop first
        run: node scripts/intel-drop-engine.js

      - name: Build weekly D.O.G video package
        run: node scripts/build-weekly-dog-video-package.js

      - name: Generate ElevenLabs voiceover
        env:
          ELEVENLABS_API_KEY: ${{ secrets.ELEVENLABS_API_KEY }}
          ELEVENLABS_VOICE_ID: ${{ secrets.ELEVENLABS_VOICE_ID }}
        run: node scripts/generate-weekly-voiceover.js

      - name: Render final weekly MP4
        run: node scripts/render-weekly-mp4.js

      - name: Upload weekly video package artifact
        uses: actions/upload-artifact@v4
        with:
          name: weekly-dog-video-package
          path: |
            video-packages/**/package.md
            video-packages/**/package.json
            video-packages/**/narration.txt
            video-packages/**/poster.svg
            video-packages/**/scene-*.svg
            video-packages/**/scene-*.png
            video-packages/**/voiceover.mp3
            video-packages/**/weekly-dog-transmission.mp4
          retention-days: 14

      - name: Commit weekly video package metadata
        run: |
          git config user.name "matrix-reprogrammed-bot"
          git config user.email "actions@github.com"
          git add data/latest-drop.json data/latest-video-package.json data/drops social/daily video-packages
          if git diff --cached --quiet; then
            echo "No weekly package changes to commit."
          else
            git commit -m "Weekly D.O.G video MP4 $(date -u +%F) [deploy]"
            git push
          fi

      - name: Publish weekly Facebook video
        continue-on-error: true
        env:
          META_PAGE_ID: ${{ secrets.META_PAGE_ID }}
          META_PAGE_ACCESS_TOKEN: ${{ secrets.META_PAGE_ACCESS_TOKEN }}
        run: node scripts/publish-facebook-video.js
