[build]
  publish = "."
  command = "node scripts/build-book-system.js && node scripts/build-homepage.js && node scripts/inject-analytics.js && node scripts/build-black-file-pdf.js && node scripts/audit-site.js"

[functions]
  directory = "netlify/functions"

[[headers]]
  for = "/*"
  [headers.values]
    X-Frame-Options = "SAMEORIGIN"
    X-Content-Type-Options = "nosniff"
    Referrer-Policy = "strict-origin-when-cross-origin"

[[headers]]
  for = "/downloads/*.pdf"
  [headers.values]
    Content-Type = "application/pdf"
    Content-Disposition = "attachment"

[[redirects]]
  from = "/home"
  to = "/index.html"
  status = 301

[[redirects]]
  from = "/start"
  to = "/start-here.html"
  status = 301

[[redirects]]
  from = "/search"
  to = "/search.html"
  status = 301

[[redirects]]
  from = "/intel"
  to = "/news.html"
  status = 301

[[redirects]]
  from = "/intel-archive"
  to = "/intel-archive.html"
  status = 301

[[redirects]]
  from = "/archive"
  to = "/books.html"
  status = 301

[[redirects]]
  from = "/blackfile"
  to = "/black-file.html"
  status = 301
