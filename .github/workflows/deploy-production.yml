name: Deploy Production

on:
  workflow_dispatch:
    inputs:
      confirm:
        description: 'Type DEPLOY to confirm production release after tests pass'
        required: true
        default: 'NO'

concurrency:
  group: production-deploy
  cancel-in-progress: false

jobs:
  deploy:
    name: Manual Cloudflare production deploy
    runs-on: ubuntu-latest
    timeout-minutes: 15
    if: github.event.inputs.confirm == 'DEPLOY'

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: '22'

      - name: Install dependencies
        run: npm install

      - name: Build and pressure test before deploy
        run: npm run build

      - name: Atlas Layers test
        run: npm run pressure-test:atlas-layers

      - name: Deploy to Cloudflare Workers
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
        run: npx wrangler deploy
