name: Daily Intel Drop Manual Backup

on:
  workflow_dispatch:

permissions:
  contents: write

jobs:
  daily-drop:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}
          fetch-depth: 0

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '24'

      - name: Generate daily update files
        run: |
          node scripts/intel-drop-engine.js
          node scripts/update-news-from-drop.js
          node scripts/build-intel-archive-page.js
          node scripts/build-black-file-pdf.js
          node scripts/repair-search-system.js
          node scripts/repair-generated-site-artifacts.js
          node scripts/ensure-shared-assets.js

      - name: Advisory site audit
        continue-on-error: true
        run: node scripts/audit-site.js

      - name: Commit generated daily update
        run: |
          set +e
          git config user.name "matrix-reprogrammed-bot"
          git config user.email "actions@github.com"
          git add data/latest-drop.json data/drops social/daily news.html intel-archive.html downloads/the-black-file-matrix-reprogrammed.pdf search.html search.js search-index.json deploy-health.json deploy-status.json downloads/deploy-health.json downloads/deploy-status.json downloads/search-system-repair-report.json downloads/generated-site-repair-report.json || true
          if git diff --cached --quiet; then
            echo "No generated changes to commit."
            exit 0
          fi
          git commit -m "Manual Daily Intel Drop $(date -u +%F) [deploy]"
          git push || (git pull --rebase --autostash origin main && git push)
