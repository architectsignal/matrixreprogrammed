name: Cloudflare Pages Deployment Guard

on:
  workflow_dispatch:

jobs:
  explain-native-pages-deploy:
    name: Use Cloudflare Pages native deployment
    runs-on: ubuntu-latest
    steps:
      - name: Deployment guard
        env:
          CLOUDFLARE_DEPLOY_HOOK_URL: ${{ secrets.CLOUDFLARE_DEPLOY_HOOK_URL }}
        run: |
          echo "Cloudflare Pages native Git integration is the production deploy path."
          echo "This workflow intentionally does not call deploy hooks on push."
          echo "Reason: the previous hook target used Workers Builds and caused a bad deploy command."
          if [ -n "$CLOUDFLARE_DEPLOY_HOOK_URL" ]; then
            case "$CLOUDFLARE_DEPLOY_HOOK_URL" in
              *"/workers/builds/deploy_hooks/"*)
                echo "Secret CLOUDFLARE_DEPLOY_HOOK_URL appears to be a Workers Builds hook, not a Pages hook. Do not use it for Pages deployment."
                exit 1
                ;;
              *"/pages/projects/"*)
                echo "Secret appears to be a Cloudflare Pages hook. Manual hook usage may be safe."
                ;;
              *)
                echo "Secret is set, but it does not look like a standard Cloudflare Pages deploy hook."
                exit 1
                ;;
            esac
          else
            echo "No deploy hook secret set. Native Cloudflare Pages Git deployment should still run from main pushes."
          fi
