[build]
  publish = "."
  command = "node scripts/build-book-system.js && node scripts/build-homepage.js && node scripts/build-seo-system.js && node scripts/enhance-epstein-watch.js && node scripts/build-epstein-evidence-ladder.js && node scripts/build-epstein-timeline-map.js && node scripts/build-intel-desk.js && node scripts/build-phase1-structure.js && node scripts/build-phase2-power-atlas.js && node scripts/build-phase3-evidence-vault.js && node scripts/build-phase4-book-universe.js && node scripts/build-phase5-ai-answer-engine.js && node scripts/build-phase6-network-maps.js && node scripts/build-phase7-conversion-funnel.js && node scripts/build-phase8-trust-center.js && node scripts/build-phase9-content-distribution.js && node scripts/build-phase10-sales-ladder.js && node scripts/build-phase11-update-monitor.js && node scripts/build-phase12-authority-clusters.js && node scripts/build-phase13-schema-engine.js && node scripts/build-phase14-dossier-packs.js && node scripts/build-phase15-feed-engine.js && node scripts/build-phase16-share-kits.js && node scripts/build-phase17-campaign-calendar.js && node scripts/build-phase18-offer-stack.js && node scripts/build-phase19-lead-magnets.js && node scripts/build-live-intel-machine.js && node scripts/cleanup-duplicates.js && node scripts/harden-public-html.js && node scripts/inject-analytics.js && node scripts/build-black-file-pdf.js && node scripts/audit-site.js && node scripts/pressure-test-site.js && node scripts/phase4-pressure-test.js && node scripts/phase5-pressure-test.js && node scripts/phase6-pressure-test.js && node scripts/phase7-pressure-test.js && node scripts/phase8-pressure-test.js && node scripts/phase9-pressure-test.js && node scripts/phase10-pressure-test.js && node scripts/phase11-pressure-test.js && node scripts/phase12-pressure-test.js && node scripts/phase13-pressure-test.js && node scripts/phase14-pressure-test.js && node scripts/phase15-pressure-test.js && node scripts/phase16-pressure-test.js && node scripts/phase17-pressure-test.js && node scripts/phase18-pressure-test.js && node scripts/phase19-pressure-test.js && node scripts/live-intel-pressure-test.js && node scripts/epstein-watch-pressure-test.js"

[functions]
  directory = "netlify/functions"

[[headers]]
  for = "/*"
  [headers.values]
    Referrer-Policy = "strict-origin-when-cross-origin"
    X-Content-Type-Options = "nosniff"
    X-Frame-Options = "SAMEORIGIN"

[[headers]]
  for = "/downloads/*.pdf"
  [headers.values]
    Content-Disposition = "attachment"
    Content-Type = "application/pdf"

[[headers]]
  for = "/downloads/*.json"
  [headers.values]
    Content-Disposition = "attachment"
    Content-Type = "application/json"

[[headers]]
  for = "/downloads/*.md"
  [headers.values]
    Content-Disposition = "attachment"
    Content-Type = "text/markdown"

[[headers]]
  for = "/downloads/*.txt"
  [headers.values]
    Content-Disposition = "attachment"
    Content-Type = "text/plain"

[[headers]]
  for = "/feeds/*.xml"
  [headers.values]
    Content-Type = "application/xml"

[[headers]]
  for = "/feeds/*.json"
  [headers.values]
    Content-Type = "application/feed+json"

# Required by phase pressure tests. Do not remove these redirects unless the matching tests are updated in the same commit.
[[redirects]]
  from = "/home"
  to = "/index.html"
  status = 301

[[redirects]]
  from = "/start"
  to = "/start-here.html"
  status = 301

[[redirects]]
  from = "/search"
  to = "/search.html"
  status = 301

[[redirects]]
  from = "/forum"
  to = "/forum.html"
  status = 200

[[redirects]]
  from = "/signal-board"
  to = "/forum.html"
  status = 200

[[redirects]]
  from = "/books"
  to = "/books.html"
  status = 200

[[redirects]]
  from = "/book-universe"
  to = "/book-universe.html"
  status = 200

[[redirects]]
  from = "/amazon-store"
  to = "/amazon-store-books.html"
  status = 200
