name: Live Intel Update

on:
  schedule:
    - cron: '17 */6 * * *'
  workflow_dispatch:

permissions:
  contents: write

jobs:
  update-live-intel:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: '22'

      - name: Update live intelligence data
        run: node scripts/update-live-intel.js

      - name: Build live intelligence hub
        run: node scripts/build-live-intel-machine.js

      - name: Validate live intelligence machine
        run: node scripts/live-intel-pressure-test.js

      - name: Commit updated intelligence data
        run: |
          git config user.name "matrix-intel-bot"
          git config user.email "actions@users.noreply.github.com"
          git add data/live-intel.json
          if git diff --cached --quiet; then
            echo "No live intel changes to commit."
          else
            git commit -m "Update live intelligence feed"
            git push
          fi
