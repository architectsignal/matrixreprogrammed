name: Deploy to Cloudflare Pages

on:
  push:
    branches: [main]
  workflow_dispatch:

concurrency:
  group: cloudflare-pages-deploy-hook
  cancel-in-progress: true

jobs:
  trigger-cloudflare:
    name: Trigger Cloudflare deploy hook
    runs-on: ubuntu-latest
    steps:
      - name: Trigger Cloudflare Pages deploy
        env:
          CLOUDFLARE_DEPLOY_HOOK_URL: ${{ secrets.CLOUDFLARE_DEPLOY_HOOK_URL }}
        run: |
          if [ -z "$CLOUDFLARE_DEPLOY_HOOK_URL" ]; then
            echo "CLOUDFLARE_DEPLOY_HOOK_URL secret is missing."
            echo "Add it in GitHub: Settings → Secrets and variables → Actions → New repository secret."
            exit 1
          fi
          curl --fail --show-error --silent -X POST "$CLOUDFLARE_DEPLOY_HOOK_URL"
          echo "Cloudflare deploy hook triggered."
