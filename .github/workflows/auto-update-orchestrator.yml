name: Automatic Site Update Orchestrator

on:
  workflow_dispatch:
    inputs:
      run_weekly_video:
        description: "Run weekly D.O.G video package now: auto, yes, or no"
        required: false
        default: "auto"
      facebook_mode:
        description: "Facebook mode: live or dry-run"
        required: false
        default: "live"
  schedule:
    - cron: "20 7 * * *"
  push:
    branches: [ main ]
    paths:
      - '.github/update-triggers/orchestrator.txt'

permissions:
  contents: write
  actions: read

concurrency:
  group: automatic-site-update-orchestrator
  cancel-in-progress: false

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: 'true'
  FACEBOOK_POST_MODE: ${{ github.event.inputs.facebook_mode || 'live' }}
  FACEBOOK_VIDEO_MODE: ${{ github.event.inputs.facebook_mode || 'live' }}
  ELEVENLABS_MODEL_ID: ${{ secrets.ELEVENLABS_MODEL_ID }}

jobs:
  automatic-update:
    name: Generate, repair, audit, commit once, and deploy
    runs-on: ubuntu-latest
    timeout-minutes: 60

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}
          fetch-depth: 0

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '24'

      - name: Install dependencies
        run: npm install

      - name: Install weekly video tools when due
        run: |
          MODE="${{ github.event.inputs.run_weekly_video || 'auto' }}"
          DAY="$(date -u +%u)"
          if [ "$MODE" = "yes" ] || { [ "$MODE" = "auto" ] && [ "$DAY" = "1" ]; }; then
            sudo apt-get update
            sudo apt-get install -y ffmpeg librsvg2-bin
          else
            echo "Weekly video tools not needed today."
          fi

      - name: Generate Daily Intel updates
        run: |
          node scripts/intel-drop-engine.js
          node scripts/update-news-from-drop.js
          node scripts/build-intel-archive-page.js
          node scripts/build-black-file-pdf.js

      - name: Build Intel Drop Vault
        run: node scripts/archive-intel-drops-to-vault.js

      - name: Build generated site
        run: npm run build

      - name: Patch newsletter Worker and capture UI
        run: |
          node scripts/patch-worker-newsletter-system.js
          node scripts/patch-newsletter-capture-ui.js

      - name: Audit branded downloads
        run: node scripts/brand-downloads-audit.js

      - name: Repair generated artifacts
        run: |
          node scripts/repair-search-system.js
          node scripts/repair-generated-site-artifacts.js
          node scripts/ensure-shared-assets.js

      - name: Generate Transparent Maintenance report
        run: node scripts/build-transparent-maintenance-report.js

      - name: Generate Weekly D.O.G package when due
        env:
          ELEVENLABS_API_KEY: ${{ secrets.ELEVENLABS_API_KEY }}
          ELEVENLABS_VOICE_ID: ${{ secrets.ELEVENLABS_VOICE_ID }}
        run: |
          MODE="${{ github.event.inputs.run_weekly_video || 'auto' }}"
          DAY="$(date -u +%u)"
          if [ "$MODE" = "yes" ] || { [ "$MODE" = "auto" ] && [ "$DAY" = "1" ]; }; then
            echo "Weekly D.O.G video package is due."
            node scripts/build-weekly-dog-video-package.js
            node scripts/generate-weekly-voiceover.js
            node scripts/render-weekly-mp4.js
          else
            echo "Weekly D.O.G video package not due today."
          fi

      - name: Final mission-critical audit
        run: |
          node scripts/patch-worker-newsletter-system.js
          node scripts/patch-newsletter-capture-ui.js
          node scripts/archive-intel-drops-to-vault.js
          node scripts/brand-downloads-audit.js
          node scripts/repair-search-system.js
          node scripts/repair-generated-site-artifacts.js
          node scripts/ensure-shared-assets.js
          node scripts/audit-site.js
          node scripts/site-function-harmony-test.js
          node scripts/forum-board-split-test.js
          node scripts/mission-critical-growth-test.js

      - name: Commit all generated automatic updates once
        run: |
          set +e
          git config user.name "matrix-auto-update-bot"
          git config user.email "actions@github.com"
          git add src/worker.js data/latest-drop.json data/latest-video-package.json data/drops data/intel-drop-vault.json social/daily video-packages news.html intel-archive.html intel-drop-vault.html newsletter.html newsletter.js optin-center.html download-center.html index.html downloads/the-black-file-matrix-reprogrammed.pdf downloads/intel-drop-vault.json downloads/intel-drop-vault.md downloads/downloads-index.json downloads/downloads-index.md downloads/transparent-maintenance-report.json downloads/transparent-maintenance-report.md downloads/site-intelligence-core.json downloads/site-intelligence-core.md downloads/site-intelligence-graph.json downloads/global-risk-clocks-linked.json downloads/policy-convergence-timer-map.json downloads/dark-speculation-deep-dossiers.json downloads/dark-speculation-deep-dossiers.md data/global-risk-clocks.json search-index.json search.html search.js llms.txt sitemap.xml dark-speculation-lab.html control-system-tracker.html site-intelligence-core.html deploy-health.json deploy-status.json downloads/deploy-health.json downloads/deploy-status.json downloads/search-system-repair-report.json downloads/generated-site-repair-report.json downloads/forum-posts.json downloads/forum-posts.md || true
          if git diff --cached --quiet; then
            echo "No generated automatic update changes to commit."
            exit 0
          fi
          git commit -m "Automatic site update $(date -u +%F) [deploy]"
          if [ "$?" -ne 0 ]; then
            echo "Commit failed. Continuing without blocking reports."
            exit 0
          fi
          for attempt in 1 2 3; do
            git push && exit 0
            echo "Push failed on attempt $attempt. Rebasing and retrying."
            git fetch origin main || true
            git pull --rebase --autostash origin main || { git rebase --abort || true; git reset --hard HEAD || true; }
            sleep 2
          done
          echo "Push failed after retries. Generated reports remain in artifacts."
          exit 1

      - name: Publish Facebook daily post
        continue-on-error: true
        env:
          META_PAGE_ID: ${{ secrets.META_PAGE_ID }}
          META_PAGE_ACCESS_TOKEN: ${{ secrets.META_PAGE_ACCESS_TOKEN }}
        run: node scripts/publish-facebook-post.js

      - name: Publish Facebook weekly video when due
        continue-on-error: true
        env:
          META_PAGE_ID: ${{ secrets.META_PAGE_ID }}
          META_PAGE_ACCESS_TOKEN: ${{ secrets.META_PAGE_ACCESS_TOKEN }}
        run: |
          MODE="${{ github.event.inputs.run_weekly_video || 'auto' }}"
          DAY="$(date -u +%u)"
          if [ "$MODE" = "yes" ] || { [ "$MODE" = "auto" ] && [ "$DAY" = "1" ]; }; then
            node scripts/publish-facebook-video.js
          else
            echo "Weekly Facebook video publish not due today."
          fi

      - name: Upload automatic update reports
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: automatic-site-update-reports
          path: |
            downloads/transparent-maintenance-report.json
            downloads/transparent-maintenance-report.md
            downloads/site-intelligence-core.json
            downloads/site-intelligence-core.md
            downloads/site-intelligence-graph.json
            downloads/intel-drop-vault.json
            downloads/intel-drop-vault.md
            downloads/downloads-index.json
            downloads/downloads-index.md
            downloads/search-system-repair-report.json
            downloads/generated-site-repair-report.json
            public-content-scrub-report.json
            site-brain-health-report.json
            downloads/site-wide-function-audit.json
            downloads/site-wide-function-audit.md
            video-packages/**/package.md
            video-packages/**/package.json
            video-packages/**/weekly-dog-transmission.mp4
          if-no-files-found: ignore
          retention-days: 14
